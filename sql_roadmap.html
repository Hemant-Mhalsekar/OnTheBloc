<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Roadmap — onthebloc</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Epilogue:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080810;
    --surface: #0f0f1a;
    --surface2: #161625;
    --surface3: #1e1e30;
    --border: #252538;
    --border2: #2e2e48;
    --text: #e2e2f0;
    --muted: #5a5a78;
    --muted2: #7a7a98;
    --accent: #5e6ad2;
    --accent-glow: rgba(94,106,210,0.15);
    --green: #4ade80;
    --green-dim: rgba(74,222,128,0.1);
    --yellow: #fbbf24;
    --yellow-dim: rgba(251,191,36,0.1);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.1);
    --phase1: #5e6ad2;
    --phase2: #a855f7;
    --phase3: #f59e0b;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Epilogue', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* Grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(94,106,210,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(94,106,210,0.03) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; }

  /* ── HEADER ── */
  header {
    padding: 32px 24px 0;
    max-width: 1100px;
    margin: 0 auto;
  }

  .breadcrumb {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .breadcrumb a {
    color: var(--accent);
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .breadcrumb a:hover { opacity: 0.7; }
  .breadcrumb span { color: var(--muted); }

  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .header-left {}

  .eyebrow {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .eyebrow::before {
    content: '';
    display: inline-block;
    width: 24px;
    height: 1px;
    background: var(--accent);
  }

  h1 {
    font-family: var(--display);
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--text);
    margin-bottom: 8px;
  }

  h1 span {
    background: linear-gradient(90deg, var(--accent), #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-desc {
    font-size: 12px;
    color: var(--muted2);
    margin-top: 8px;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin: 28px 0;
  }

  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }

  .stat-num {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    font-family: var(--display);
  }

  .stat-label { color: var(--muted); font-size: 11px; }

  .stat-pill.highlight { border-color: var(--accent); background: var(--accent-glow); }
  .stat-pill.highlight .stat-num { color: var(--accent); }

  /* Overall progress */
  .overall-progress {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 32px;
  }

  .op-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .op-label { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .op-pct { font-size: 13px; font-weight: 600; color: var(--accent); }

  .progress-track {
    background: var(--surface3);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--accent), #a78bfa, var(--green));
    transition: width 0.5s ease;
  }

  /* Phase tabs */
  .phase-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .phase-tab {
    font-family: var(--mono);
    font-size: 11px;
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted2);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .phase-tab .tab-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .phase-tab:hover { border-color: var(--border2); color: var(--text); }
  .phase-tab.active { color: var(--text); }
  .phase-tab[data-phase="all"].active { border-color: var(--muted2); background: var(--surface2); }
  .phase-tab[data-phase="1"].active { border-color: var(--phase1); background: rgba(94,106,210,0.1); color: var(--phase1); }
  .phase-tab[data-phase="2"].active { border-color: var(--phase2); background: rgba(168,85,247,0.1); color: var(--phase2); }
  .phase-tab[data-phase="3"].active { border-color: var(--phase3); background: rgba(245,158,11,0.1); color: var(--phase3); }

  /* Main layout */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* Phase section */
  .phase-section { margin-bottom: 40px; }
  .phase-section.hidden { display: none; }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .phase-badge {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
    font-weight: 600;
  }

  .phase-badge.p1 { background: rgba(94,106,210,0.15); color: var(--phase1); border: 1px solid rgba(94,106,210,0.3); }
  .phase-badge.p2 { background: rgba(168,85,247,0.15); color: var(--phase2); border: 1px solid rgba(168,85,247,0.3); }
  .phase-badge.p3 { background: rgba(245,158,11,0.15); color: var(--phase3); border: 1px solid rgba(245,158,11,0.3); }

  .phase-title {
    font-family: var(--display);
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }

  .phase-progress-text { margin-left: auto; font-size: 11px; color: var(--muted); }

  /* Day grid */
  .day-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 10px;
  }

  /* Day card */
  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .day-card:hover { border-color: var(--border2); }
  .day-card.completed { border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.03); }
  .day-card.moved { border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.03); }

  .day-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px 10px;
    cursor: pointer;
    user-select: none;
  }

  .day-num {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--muted);
    min-width: 36px;
  }

  .day-type {
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
  }

  .day-type.theory { background: rgba(94,106,210,0.15); color: var(--phase1); }
  .day-type.practical { background: rgba(74,222,128,0.12); color: var(--green); }

  .day-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
    line-height: 1.3;
  }

  .day-status {
    font-size: 11px;
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .status-done { color: var(--green); }
  .status-moved { color: var(--yellow); }
  .status-pending { color: var(--muted); }

  .chevron {
    font-size: 10px;
    color: var(--muted);
    transition: transform 0.2s;
    margin-left: 6px;
  }

  .day-card.open .chevron { transform: rotate(180deg); }

  /* Day progress bar */
  .day-mini-bar {
    height: 2px;
    background: var(--surface3);
    margin: 0 16px 0;
  }

  .day-mini-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s;
    border-radius: 2px;
  }

  .day-card.completed .day-mini-fill { background: var(--green); }

  /* Tasks */
  .day-tasks {
    display: none;
    padding: 8px 16px 14px;
    border-top: 1px solid var(--border);
    margin-top: 10px;
  }

  .day-card.open .day-tasks { display: block; animation: slideDown 0.2s ease; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    border-radius: 4px;
  }

  .task-item:last-of-type { border-bottom: none; }
  .task-item:hover { background: var(--surface2); padding-left: 6px; padding-right: 6px; margin: 0 -6px; }

  .task-check {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    border: 1.5px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
    font-size: 10px;
    transition: all 0.15s;
  }

  .task-item.done .task-check {
    background: var(--green);
    border-color: var(--green);
    color: #0a1a10;
  }

  .task-text {
    font-size: 12px;
    color: var(--muted2);
    line-height: 1.5;
    flex: 1;
    transition: color 0.15s;
  }

  .task-item.done .task-text {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: rgba(74,222,128,0.4);
  }

  /* Day actions */
  .day-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .action-btn {
    font-family: var(--mono);
    font-size: 10px;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted2);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .action-btn:hover { color: var(--text); border-color: var(--border2); }

  .action-btn.complete-all { border-color: rgba(74,222,128,0.3); color: var(--green); }
  .action-btn.complete-all:hover { background: var(--green-dim); }

  .action-btn.move-day { border-color: rgba(251,191,36,0.3); color: var(--yellow); }
  .action-btn.move-day:hover { background: var(--yellow-dim); }

  .action-btn.reset-day { border-color: rgba(248,113,113,0.3); color: var(--red); }
  .action-btn.reset-day:hover { background: var(--red-dim); }

  /* Moved notice */
  .moved-notice {
    font-size: 11px;
    color: var(--yellow);
    padding: 6px 10px;
    background: var(--yellow-dim);
    border-radius: 6px;
    margin-top: 8px;
    border: 1px solid rgba(251,191,36,0.2);
  }

  /* Task count */
  .task-count {
    font-size: 10px;
    color: var(--muted);
    padding: 4px 16px 8px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 12px;
    color: var(--text);
    z-index: 1000;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s ease;
    max-width: 300px;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.green { border-color: rgba(74,222,128,0.4); }
  .toast.yellow { border-color: rgba(251,191,36,0.4); }

  /* Responsive */
  @media (max-width: 600px) {
    .day-grid { grid-template-columns: 1fr; }
    .stats-bar { gap: 6px; }
    .phase-tabs { gap: 4px; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="breadcrumb">
      <a href="index.html">← onthebloc</a>
      <span>/</span>
      <span>sql_roadmap</span>
    </div>
    <div class="header-top">
      <div class="header-left">
        <div class="eyebrow">36-day roadmap</div>
        <h1>MySQL <span>Mastery</span></h1>
        <div class="header-desc">// 1 hr/day · e-commerce schema · theory + practical alternating</div>
      </div>
    </div>

    <div class="stats-bar">
      <div class="stat-pill highlight">
        <div>
          <div class="stat-num" id="stat-done">0</div>
          <div class="stat-label">days done</div>
        </div>
      </div>
      <div class="stat-pill">
        <div>
          <div class="stat-num" id="stat-tasks">0</div>
          <div class="stat-label">tasks done</div>
        </div>
      </div>
      <div class="stat-pill">
        <div>
          <div class="stat-num" id="stat-remaining">36</div>
          <div class="stat-label">days left</div>
        </div>
      </div>
      <div class="stat-pill">
        <div>
          <div class="stat-num" id="stat-moved">0</div>
          <div class="stat-label">moved</div>
        </div>
      </div>
    </div>

    <div class="overall-progress">
      <div class="op-top">
        <span class="op-label">overall progress</span>
        <span class="op-pct" id="op-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="op-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="phase-tabs">
      <button class="phase-tab active" data-phase="all" onclick="filterPhase('all')">
        <span class="tab-dot" style="background:var(--muted2)"></span> All days
      </button>
      <button class="phase-tab" data-phase="1" onclick="filterPhase('1')">
        <span class="tab-dot" style="background:var(--phase1)"></span> Phase 1 — Foundations
      </button>
      <button class="phase-tab" data-phase="2" onclick="filterPhase('2')">
        <span class="tab-dot" style="background:var(--phase2)"></span> Phase 2 — Intermediate
      </button>
      <button class="phase-tab" data-phase="3" onclick="filterPhase('3')">
        <span class="tab-dot" style="background:var(--phase3)"></span> Phase 3 — Advanced
      </button>
    </div>
  </header>

  <div class="main" id="main-content"></div>

</div>

<div class="toast" id="toast"></div>

<script>
const ROADMAP = [
  {
    phase: 1, day: 1, type: 'theory', title: 'What is MySQL & How it Works',
    tasks: [
      'What is a database, what is a DBMS, what is an RDBMS',
      'How MySQL works — client/server model, what happens when you run a query',
      'Tables, rows, columns — the building blocks',
      'Primary key concept — why every table needs one',
      'What is a schema',
      'Take handwritten notes — keep them simple, focus on understanding not definitions'
    ]
  },
  {
    phase: 1, day: 2, type: 'practical', title: 'Setup & Schema Creation',
    tasks: [
      'Install MySQL Community Server + MySQL Workbench, OR use db-fiddle.com (MySQL 8.0)',
      'Connect via CLI: mysql -u root -p',
      'Run SELECT version(); and SHOW DATABASES;',
      'Create database: CREATE DATABASE ecommerce; then USE ecommerce;',
      'Create users table — id, name, email, phone, role, created_at',
      'Create categories table — id, name, description',
      'Create products table — id, name, description, price, stock_quantity, category_id, created_at',
      'Create orders table — id, user_id, status, total_amount, created_at',
      'Create order_items table — id, order_id, product_id, quantity, unit_price',
      'Create payments table — id, order_id, amount, method, status, paid_at',
      'Create reviews table — id, user_id, product_id, rating, comment, created_at',
      'Run DESCRIBE table_name; on each of the 7 tables to verify',
      'Insert 2–3 dummy rows into users and categories manually'
    ]
  },
  {
    phase: 1, day: 3, type: 'theory', title: 'Data Types & NULL',
    tasks: [
      'Numeric types: INT, BIGINT, DECIMAL(p,s) — when to use each',
      'String types: VARCHAR(n) vs CHAR(n) vs TEXT — differences and use cases',
      'Date types: DATE, DATETIME, TIMESTAMP — key differences',
      'BOOLEAN in MySQL — stored as TINYINT(1)',
      'What NULL actually means — unknown, not zero, not empty string',
      'NOT NULL and DEFAULT — when and why to use them',
      'Take handwritten notes on each type with a real example'
    ]
  },
  {
    phase: 1, day: 4, type: 'practical', title: 'Data Types & Inserting Data',
    tasks: [
      'Drop and recreate all 7 tables with proper, well-thought-out data types',
      'Add NOT NULL and DEFAULT where it makes sense (e.g. created_at DEFAULT NOW())',
      'Insert 10 users — mix of customers and admins',
      'Insert 5 categories — electronics, clothing, books, food, accessories',
      'Insert 15 products spread across categories',
      'Insert 10 orders',
      'Insert 20 order_items',
      'Insert 10 payments',
      'Insert 10 reviews',
      'Verify all inserts with SELECT * FROM each table'
    ]
  },
  {
    phase: 1, day: 5, type: 'theory', title: 'SELECT & Filtering',
    tasks: [
      'SELECT * vs selecting specific columns — why * is bad in production',
      'WHERE clause and how it works',
      'Comparison operators: =, !=, >, <, >=, <=',
      'BETWEEN — inclusive on both ends',
      'IN and NOT IN',
      'IS NULL and IS NOT NULL',
      'Combining conditions with AND, OR, NOT',
      'Take notes with examples for each operator'
    ]
  },
  {
    phase: 1, day: 6, type: 'practical', title: 'SELECT & Filtering — Queries',
    tasks: [
      'Fetch all users',
      'Fetch only name and email of users',
      'Fetch all products with price greater than 500',
      'Fetch products with price between 200 and 1000',
      'Fetch orders with status delivered or shipped',
      'Fetch users where phone is NULL',
      'Fetch products that belong to category_id IN (1, 2, 3)',
      'Fetch all orders that are NOT cancelled',
      'Combine: products in a specific category AND price below 500',
      'Write at least 1 more query mixing different operators — total 10+ queries'
    ]
  },
  {
    phase: 1, day: 7, type: 'theory', title: 'Sorting, Limiting & LIKE',
    tasks: [
      'ORDER BY column ASC and DESC',
      'Ordering by multiple columns and how it resolves ties',
      'LIMIT n — cap the number of results',
      'LIMIT n OFFSET m — how pagination works, what offset means',
      'LIKE operator — pattern matching',
      '% wildcard — matches zero or more characters',
      '_ wildcard — matches exactly one character',
      'NOT LIKE — inverse matching',
      'Take notes with example queries for each'
    ]
  },
  {
    phase: 1, day: 8, type: 'practical', title: 'Sorting, Limiting & LIKE — Queries',
    tasks: [
      'Fetch all products sorted by price highest to lowest',
      'Fetch all orders sorted by created_at newest first',
      'Fetch the 5 most expensive products',
      'Fetch products ranked 6 to 10 by price using OFFSET',
      'Find all products whose name contains the word "pro"',
      'Find all users whose email ends with @gmail.com',
      'Find all users whose name starts with A',
      'Find products whose name is exactly 5 characters using _____',
      'Sort users alphabetically and fetch only first page of 5',
      'Combine LIKE + ORDER BY + LIMIT in one query'
    ]
  },
  {
    phase: 1, day: 9, type: 'theory', title: 'Constraints & Keys',
    tasks: [
      'PRIMARY KEY — what it enforces, auto_increment',
      'FOREIGN KEY — what referential integrity means',
      'UNIQUE constraint — what it does',
      'CHECK constraint — enforcing value rules',
      'ON DELETE CASCADE vs ON DELETE SET NULL vs ON DELETE RESTRICT',
      'ALTER TABLE — adding and dropping constraints after table creation',
      'Take notes with real examples for each constraint type'
    ]
  },
  {
    phase: 1, day: 10, type: 'practical', title: 'Constraints & Keys — Applied',
    tasks: [
      'Recreate all 7 tables with proper PRIMARY KEY and FOREIGN KEY constraints',
      'Add UNIQUE constraint on users.email',
      'Add CHECK on products: price > 0 and stock_quantity >= 0',
      'Add CHECK on reviews: rating BETWEEN 1 AND 5',
      'Test FK enforcement: insert order_item with non-existent product_id — observe error',
      'Test UNIQUE: insert two users with same email — observe error',
      'Test CHECK: insert product with price = -100 — observe error',
      'Test ON DELETE CASCADE: delete a user, verify their orders are gone',
      'Run SHOW CREATE TABLE orders; to see full table definition with constraints'
    ]

// Storage helpers
function save(key, val) {
  try { localStorage.setItem('sql_' + key, JSON.stringify(val)); } catch(e) {}
}

function load(key, def) {
  try {
    const v = localStorage.getItem('sql_' + key);
    return v !== null ? JSON.parse(v) : def;
  } catch(e) { return def; }
}

// State
let taskState = load('tasks', {});
let movedDays = load('moved', {});

// Toast
let toastTimer;
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// Toggle task
function toggleTask(dayNum, taskIdx) {
  const key = dayNum + '_' + taskIdx;
  taskState[key] = !taskState[key];
  save('tasks', taskState);
  const el = document.querySelector(`[data-task="${key}"]`);
  if (el) {
    el.classList.toggle('done', taskState[key]);
    el.querySelector('.task-check').textContent = taskState[key] ? '✓' : '';
  }
  updateDayCard(dayNum);
  updateStats();
}

// Complete all tasks in a day
function completeAll(dayNum) {
  const day = ROADMAP.find(d => d.day === dayNum);
  day.tasks.forEach((_, i) => {
    const key = dayNum + '_' + i;
    taskState[key] = true;
    const el = document.querySelector(`[data-task="${key}"]`);
    if (el) {
      el.classList.add('done');
      el.querySelector('.task-check').textContent = '✓';
    }
  });
  save('tasks', taskState);
  updateDayCard(dayNum);
  updateStats();
  showToast('Day ' + dayNum + ' complete! 🔥', 'green');
}

// Reset day
function resetDay(dayNum) {
  const day = ROADMAP.find(d => d.day === dayNum);
  day.tasks.forEach((_, i) => {
    const key = dayNum + '_' + i;
    taskState[key] = false;
    const el = document.querySelector(`[data-task="${key}"]`);
    if (el) {
      el.classList.remove('done');
      el.querySelector('.task-check').textContent = '';
    }
  });
  save('tasks', taskState);
  updateDayCard(dayNum);
  updateStats();
  showToast('Day ' + dayNum + ' reset', '');
}

// Move to next day
function moveToNextDay(dayNum) {
  movedDays[dayNum] = true;
  save('moved', movedDays);
  const card = document.querySelector(`[data-day="${dayNum}"]`);
  if (card) {
    card.classList.add('moved');
    card.classList.remove('completed');
    const notice = card.querySelector('.moved-notice');
    if (notice) notice.style.display = 'block';
    const statusEl = card.querySelector('.day-status');
    if (statusEl) statusEl.innerHTML = '<span class="status-moved">→ moved</span>';
  }
  updateStats();
  showToast('Day ' + dayNum + ' moved to tomorrow 📅', 'yellow');
}

// Toggle card open/close
function toggleCard(dayNum) {
  const card = document.querySelector(`[data-day="${dayNum}"]`);
  if (card) card.classList.toggle('open');
}

// Update single day card visuals
function updateDayCard(dayNum) {
  const day = ROADMAP.find(d => d.day === dayNum);
  const total = day.tasks.length;
  const done = day.tasks.filter((_, i) => taskState[dayNum + '_' + i]).length;
  const pct = Math.round((done / total) * 100);
  const isComplete = done === total;

  const card = document.querySelector(`[data-day="${dayNum}"]`);
  if (!card) return;

  card.classList.toggle('completed', isComplete);
  if (isComplete) card.classList.remove('moved');

  const fill = card.querySelector('.day-mini-fill');
  if (fill) fill.style.width = pct + '%';

  const countEl = card.querySelector('.task-count');
  if (countEl) countEl.textContent = done + ' / ' + total + ' tasks done';

  const statusEl = card.querySelector('.day-status');
  if (statusEl && !movedDays[dayNum]) {
    if (isComplete) {
      statusEl.innerHTML = '<span class="status-done">✓ done</span>';
    } else if (done > 0) {
      statusEl.innerHTML = `<span class="status-pending">${pct}%</span>`;
    } else {
      statusEl.innerHTML = '<span class="status-pending">pending</span>';
    }
  }
}

// Update all stats
function updateStats() {
  let totalTasks = 0, doneTasks = 0, doneDays = 0, movedCount = 0;

  ROADMAP.forEach(day => {
    const total = day.tasks.length;
    const done = day.tasks.filter((_, i) => taskState[day.day + '_' + i]).length;
    totalTasks += total;
    doneTasks += done;
    if (done === total) doneDays++;
  });

  movedCount = Object.keys(movedDays).filter(k => movedDays[k]).length;

  const pct = totalTasks > 0 ? Math.round((doneTasks / totalTasks) * 100) : 0;

  document.getElementById('stat-done').textContent = doneDays;
  document.getElementById('stat-tasks').textContent = doneTasks;
  document.getElementById('stat-remaining').textContent = 36 - doneDays;
  document.getElementById('stat-moved').textContent = movedCount;
  document.getElementById('op-pct').textContent = pct + '%';
  document.getElementById('op-fill').style.width = pct + '%';
}

// Phase filter
function filterPhase(phase) {
  document.querySelectorAll('.phase-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-phase="${phase}"]`).classList.add('active');

  document.querySelectorAll('.phase-section').forEach(s => {
    if (phase === 'all' || s.dataset.phase === phase) {
      s.classList.remove('hidden');
    } else {
      s.classList.add('hidden');
    }
  });
}

// Render
function render() {
  const container = document.getElementById('main-content');

  const phases = [
    { num: '1', title: 'Foundations', badge: 'p1', days: ROADMAP.filter(d => d.phase === 1) },
    { num: '2', title: 'Intermediate', badge: 'p2', days: ROADMAP.filter(d => d.phase === 2) },
    { num: '3', title: 'Advanced', badge: 'p3', days: ROADMAP.filter(d => d.phase === 3) },
  ];

  container.innerHTML = phases.map(phase => `
    <div class="phase-section" data-phase="${phase.num}">
      <div class="phase-header">
        <span class="phase-badge ${phase.badge}">Phase ${phase.num}</span>
        <span class="phase-title">${phase.title}</span>
        <span class="phase-progress-text">${phase.days.length} days</span>
      </div>
      <div class="day-grid">
        ${phase.days.map(day => renderDayCard(day)).join('')}
      </div>
    </div>
  `).join('');

  // Init card states
  ROADMAP.forEach(day => updateDayCard(day.day));
  updateStats();
}

function renderDayCard(day) {
  const total = day.tasks.length;
  const done = day.tasks.filter((_, i) => taskState[day.day + '_' + i]).length;
  const pct = Math.round((done / total) * 100);
  const isComplete = done === total;
  const isMoved = movedDays[day.day];

  const statusHtml = isMoved && !isComplete
    ? '<span class="status-moved">→ moved</span>'
    : isComplete
    ? '<span class="status-done">✓ done</span>'
    : done > 0
    ? `<span class="status-pending">${pct}%</span>`
    : '<span class="status-pending">pending</span>';

  return `
    <div class="day-card ${isComplete ? 'completed' : ''} ${isMoved && !isComplete ? 'moved' : ''}" data-day="${day.day}">
      <div class="day-header" onclick="toggleCard(${day.day})">
        <span class="day-num">DAY ${String(day.day).padStart(2,'0')}</span>
        <span class="day-type ${day.type}">${day.type}</span>
        <span class="day-title">${day.title}</span>
        <span class="day-status">${statusHtml}</span>
        <span class="chevron">▼</span>
      </div>
      <div class="day-mini-bar">
        <div class="day-mini-fill" style="width:${pct}%"></div>
      </div>
      <div class="task-count">${done} / ${total} tasks done</div>
      <div class="day-tasks">
        ${day.tasks.map((task, i) => {
          const key = day.day + '_' + i;
          const isDone = taskState[key];
          return `
            <div class="task-item ${isDone ? 'done' : ''}" data-task="${key}" onclick="toggleTask(${day.day}, ${i})">
              <div class="task-check">${isDone ? '✓' : ''}</div>
              <div class="task-text">${task}</div>
            </div>
          `;
        }).join('')}
        ${isMoved && !isComplete ? `<div class="moved-notice">📅 Moved — catch up when you can</div>` : ''}
        <div class="day-actions">
          <button class="action-btn complete-all" onclick="event.stopPropagation(); completeAll(${day.day})">✓ complete all</button>
          <button class="action-btn move-day" onclick="event.stopPropagation(); moveToNextDay(${day.day})">→ move to next day</button>
          <button class="action-btn reset-day" onclick="event.stopPropagation(); resetDay(${day.day})">↺ reset</button>
        </div>
      </div>
    </div>
  `;
}

render();
</script>
